name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: 1.26.5
  NODE_VERSION: 24
  PNPM_VERSION: 11.13.1

jobs:
  backend:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum
      - name: Verify formatting
        run: test -z "$(gofmt -l cmd internal migrations web)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Vulnerability reachability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
      - name: Build binary
        run: go build -buildvcs=false -trimpath -o /tmp/sidervia ./cmd/sidervia

  frontend:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          package_json_file: web/package.json
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
          package-manager-cache: false
      - name: Install locked dependencies
        run: pnpm --dir web install --frozen-lockfile
      - name: Verify generated Admin API types
        run: pnpm --dir web generate:api
      - name: Reject generated type drift
        run: git diff --exit-code -- web/src/api/schema.d.ts
      - name: Lint
        run: pnpm --dir web lint
      - name: Typecheck
        run: pnpm --dir web typecheck
      - name: Unit tests
        run: pnpm --dir web test --run
      - name: Production build
        run: pnpm --dir web build
      - name: Production dependency audit
        run: pnpm --dir web audit --prod --audit-level high

  container:
    name: Container
    needs:
      - backend
      - frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build release-shaped image
        run: >-
          docker build
          --build-arg VERSION=ci
          --build-arg COMMIT=${GITHUB_SHA}
          --build-arg BUILD_TIME=1970-01-01T00:00:00Z
          --tag sidervia:ci
          .
      - name: Verify non-root runtime metadata
        run: test "$(docker inspect --format '{{.Config.User}}' sidervia:ci)" = "65532:65532"
      - name: Smoke-test image entrypoint
        run: docker run --rm --read-only --cap-drop=ALL sidervia:ci version
